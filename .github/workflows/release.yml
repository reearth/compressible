name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  # Go: tagging "vX.Y.Z" is the release for proxy.golang.org — no job needed.

  npm:
    name: npm publish
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci || npm install
      - name: Sync version from tag
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"
      - run: npm test
      - run: npm run build
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Rust publish is intentionally disabled for now — enable when ready to
  # release `reearth-compressible` to crates.io.
