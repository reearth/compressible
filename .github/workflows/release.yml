name: Release

on:
  push:
    tags:
      # Go: tagging "go/vX.Y.Z" makes proxy.golang.org pick it up — no job needed.
      - "go/v*"
      - "js/v*"
      - "rust/v*"

permissions:
  contents: read

jobs:
  npm:
    name: npm publish
    if: startsWith(github.ref, 'refs/tags/js/v')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: js
    permissions:
      contents: read
      id-token: write # for npm provenance and (future) trusted publishing
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci || npm install
      - name: Sync version from tag
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#js/v}"
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Rust publish is intentionally disabled for now — enable when ready to
  # release `reearth-compressible` to crates.io.
