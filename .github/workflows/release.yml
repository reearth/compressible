name: Release

on:
  push:
    tags:
      # Go: tagging "go/vX.Y.Z" makes proxy.golang.org pick it up — no job needed.
      - "go/v*"
      - "js/v*"
      - "rust/v*"

permissions:
  contents: read

jobs:
  npm:
    name: npm publish
    if: startsWith(github.ref, 'refs/tags/js/v')
    runs-on: ubuntu-latest
    environment: npm-publish # gates publish on required reviewer approval
    defaults:
      run:
        working-directory: js
    permissions:
      contents: read
      id-token: write # for npm provenance and trusted publishing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          # npm Trusted Publishing requires Node >=22.14 and npm >=11.5.1.
          # Node 22 still ships with npm 10.x, so we upgrade npm below.
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Install npm 11 (required for Trusted Publishing)
        # In-place self-upgrade (`npm i -g npm@X`) crashes with MODULE_NOT_FOUND
        # because the running npm clobbers its own deps mid-install. Installing
        # into a separate prefix and prepending it to PATH avoids that.
        run: |
          npm install -g --prefix="$RUNNER_TEMP/npm" npm@11.14.1
          echo "$RUNNER_TEMP/npm/bin" >> "$GITHUB_PATH"
      - name: Verify npm version
        run: npm --version
      - run: npm ci || npm install
      - name: Sync version from tag
        run: npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#js/v}"
      - run: npm publish --provenance --access public

  # Rust publish is intentionally disabled for now — enable when ready to
  # release `reearth-compressible` to crates.io.
